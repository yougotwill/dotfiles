# syntax=toml
#
# Example configuration for Paneru.
#
[options]
# Enables focus follows mouse. Enabled by default, set to false to disable.
focus_follows_mouse = false

# Enables mouse follows focus. Enabled by default, set to false to disable.
mouse_follows_focus = false

# Array of widths used by the `window_resize` action to cycle between.
# Defaults to 25%, 33%, 50%, 66% and 75%.
preset_column_widths = [ 0.33, 0.5, 0.67, 0.99 ]

# Animation speed in 1/10th of display resolution per second.
# E.g. a value of 20 means: move at a speed of two display sizes per second.
# To disable animations, leave this unset or set to a very large value.
# Default: 50
animation_speed = 70

# Automatically center the focused window when switching focus with keyboard,
# i.e. 'window_focus_west' or 'window_focus_east'.
auto_center = true

# If enabled, the mouse will warp to another screen above or below,
# when touching the left or right edge. The direction depends on the direction
# - a negative value will cause the left edge to war warp to a screen above
# and the right edge to a screen below. This allows having horizontal positioning
# of displays while having them aligned in a virtual layout in macOS settings (-1, 1).
# Default: Off
horizontal_mouse_warp = 1

# Height of off-screen window slivers as a ratio (0.0–1.0) of the display
# height. Lower values hide the window's corner radius at screen edges.
# Default: 1.0 (full height, no inset).
# sliver_height = 1.0

# Width of off-screen window slivers in pixels. Controls how much of an
# off-screen window peeks from the screen edge.
# Default: 5 pixels.
sliver_width = 10

# Override the system-reported menubar height (in pixels).
# Useful when auto-hiding the menubar or when the detected value is wrong.
# When unset, the height reported by macOS is used.
# menubar_height = 25

# How much of a window can be hidden before it's forced into view on focus
# change. 0.0 = eager, 1.0 = lazy.
# window_hidden_ratio = 0.0

# If disabled, window_resize and window_shrink stop at the largest/smallest
# preset instead of cycling back.
# window_resize_cycle = true

# If enabled allows window resizing using mouse movement. For example cmd + shift
# will allow resizing of the window when holding those keys. Proximity of the
# pointer to left or right window edge determines which side will be adjusted.
# mouse_resize_modifier = ''

[padding]
# Padding applied at screen edges (in pixels). Independent from the
# between-window gaps set by per-window horizontal/vertical_padding.
# Default: 0 on all sides.
top = 8
bottom = 8
left = 16
right = 16

[swipe]
# Swipe sensitivity multiplier. Lower values = less distance per finger movement.
# Range: 0.1–2.0. Default: 0.35.
sensitivity = 0.75

# Swipe inertia deceleration rate. Higher values = faster stop.
# Range: 1.0–10.0. Default: 4.0.
deceleration = 1.5

# If enabled, the swipe gesture moves windows smoothly with the fingers.
# If disabled, it snaps to windows as you swipe. Default: true.
# continuous = false

[swipe.gesture]
# How many fingers to use for moving windows left and right.
# Make sure that it doesn't clash with OS setting for workspace switching.
# Values lower than 3 will be ignored.
# Remove the line to disable the gesture feature.
# Apple touchpads support gestures with more than five fingers (!),
# but it is probably not that useful to use two hands :)
fingers_count = 3

# Which direction should windows move with a swipe gesture.
# "Natural" => Swipe fingers to the right, windows move to the right.
# "Reversed" => Swipe fingers to the right, windows move to the left.
# Default: "Natural"
# direction = "Natural"

# Interpret the vertical gestures with fingers_count or ignore them.
# Enabling this allows using vertical swipe gestures to change
# virtual desktops.
vertical = false

# [swipe.scroll]
# Modifier key(s) required to slide windows with the scroll wheel:
# "alt", "rcmd", "ralt + cmd", "lctrl + lalt + cmd", etc.
# modifier = "alt"

# Additional modifier key that, when held together with modifier,
# switches virtual workspaces vertically instead of scrolling horizontally.
# For example, if modifier = "alt" and vertical_modifier = "shift",
# then alt + scroll slides windows horizontally and alt + shift + scroll
# switches virtual workspace rows.
# vertical_modifier = ''

[decorations]

# Toggles display of the currently active virtual workspace in the menubar.
# Note: disabling menubar indicator requires a restart
# Default: true
workspace_menu_status = false

# Toggles display of the currently active virtual workspace in a brief status popup window.
# Default: true
workspace_popup_status = true

# Visual styling for active and inactive windows.
# Do not set a color.
# [decorations.inactive.dim]
# Dimming intensity. -1.0 is fully black, 1.0 is fully white.
# opacity = -0.15
# Dimming intensity used when macOS is in Dark Mode.
# opacity_night = 0

[bindings]
# Switch to a previously focused window on this workspace.
window_focus_managed = ["ctrl + alt + shift - return"]

# Switch to a previously focused floating window on this workspace.
window_focus_unmanaged = ["ctrl + alt + cmd - return"]

# Moves the focus between windows. If there are no windows when moving up or
# down, will swtich focus to the display above or below.
window_focus_west = ["ctrl + alt + shift - h"]
window_focus_east = ["ctrl + alt + shift - l"]
window_focus_north = ["ctrl + alt + shift - k"]
window_focus_south = ["ctrl + alt + shift - j"]

# Swaps windows in chosen direction. If there are no windows to swap, will
# move the window to a display above or below.
window_swap_west = ["ctrl + alt + cmd - h"]
window_swap_east = ["ctrl + alt + cmd - l"]
window_swap_north = ["ctrl + alt + cmd - k"]
window_swap_south = ["ctrl + alt + cmd - j"]

# Jump to the left-most or right-most windows.
window_focus_first = ["ctrl + alt + shift - u"]
window_focus_last = ["ctrl + alt + shift - i"]

# Move the current window into the left-most or right-most positions.
window_swap_first = ["ctrl + alt + cmd - u"]
window_swap_last = ["ctrl + alt + cmd - i"]

# Centers the current window on screen.
window_center = ["ctrl + alt + shift - c"]

# Cycles between the window sizes defined in the `preset_column_widths` option.
window_resize = ["ctrl + alt + shift - r"]

# Cycles backwards through `preset_column_widths`.
window_shrink = ["ctrl + alt + cmd - r"]

# Toggle full width for the current focused window.
window_fullwidth = ["ctrl + alt + shift - f"]

# Toggles the window for management. If unmanaged, the window will be "floating".
window_manage = ["ctrl + alt + cmd - v"]

# Stack the current window into the column on the left.
window_stack = ["ctrl + alt + shift - ]"]

# Pull a window out of a stack into its own column.
window_unstack = ["ctrl + alt + shift - ["]

# Size stacked windows in the column to equal heights.
window_equalize = ["ctrl + alt + shift - e"]

# Moves currently focused window to the next display.
window_nextdisplay = ["ctrl + alt + shift - n"]

# Move focused window to the next monitor but stay on current.
window_nextdisplaysend = ["ctrl + alt + cmd - n"]

# Moves the mouse pointer to the next display.
mouse_nextdisplay = ["ctrl + alt + shift - m"]

# Snap an overflowing window into the viewport.
window_snap = ["ctrl + alt + shift - b"]

# Make the floating windows layer visible on the current workspace.
window_raise_floating = ["ctrl + alt + shift - v"]

# Selectively move the floating windows in front or behind of the workspace windows.
# window_togglefloatlayer = ["ctrl + alt + shift - v"]

# Exit paneru
quit = ["ctrl + alt + cmd -  q"]

# Virtual Workspaces (experiemental)
# Move to the previous/next virtual workspace.
window_virtual_north = ["ctrl - leftarrow"]
window_virtual_south = ["ctrl - rightarrow"]

# Move the current window to the previous/next virtual workspace.
window_virtualmove_north = ["ctrl + alt + shift - leftarrow"]
window_virtualmove_south = ["ctrl + alt + shift - rightarrow"]

# Move currently focused window to the previous/next virtual workspace but stay on the current one.
# window_virtualsend_north = ["ctrl + alt + shift - leftarrow"]
# window_virtualmove_south = ["ctrl + alt + shift - rightarrow"]

# Switch directly to the numbered virtual workspace.
window_virtualnum_1 = ["ctrl + alt + shift - 1"]
window_virtualnum_2 = ["ctrl + alt + shift - 2"]

# Move currently focused window to the numbered virtual workspace and follow it.
# window_virtualmovenum_1 = ["ctrl - 1"]
# window_virtualmovenum_2 = ["ctrl - 2"]

# Move currently focused window to the numbered virtual workspace but stay on the current one.
window_virtualsendnum_1 = ["ctrl - 1"]
window_virtualsendnum_2 = ["ctrl - 2"]

# Experimental features
# Disabled by default.

# Active Window border
# [decorations.active.border]
# Draw a border around the active (focused) window.
# Default: false.
# enabled = true

# Hex color for the active window border.
# Default: "#FFFFFF" (white).
# color = "#F7821A"

# Opacity of the active window border (0.0–1.0).
# Default: 1.0.
# opacity = 1.0

# Width of the active window border in pixels.
# Default: 2.0.
# width = 2.0

# Corner radius of the active window border in pixels.
# Default: 10.0.
# radius = 10.0

# Window properties, matched by a RegExp title string.
[windows]

# NOTE: the order of the properties matter e.g. bundle_id before title otherwise you lose specifity.
# Put the most general rules at the end of the file so it doesn't override other rules e.g. [windows.all]

[windows.pip]
# Title RegExp pattern is required.
title = "Picture.*(in)?.*[Pp]icture"
# Do not manage this window, e.g. it will be floating.
floating = true

# [windows.neovide]
# Matches an editor by title and always inserts its window at index 1,
# a specific initial width (as a ratio of display width),
# and let some bindings pass through.
# Note: bundle_id is optional. Some apps (e.g. plain binaries) do not
# report one, so matching by title alone is often more reliable.
# bundle_id = "com.neovide.neovide"
# title = "Neovide.*"
# index = 1
# width = 0.5
# bindings_passthrough = ["ctrl-h", "ctrl-l"]

# [windows.popup]
# # Matches a popup and silently appends it at the end.
# title = "Unimportant popup window"
# dont_focus = true
# index = 100

# [windows.passwords]
# # Floating window placed on a grid. The format is "cols:rows:x:y:w:h".
# # This divides the display into a 6x6 grid and places the window at cell (1,1)
# # spanning 4 columns and 4 rows — roughly centered covering 2/3 of the display.
# title = "Passwords.*"
# floating = true
# grid = "6:6:1:1:4:4"

# Window focusing
[windows.focus_yubioath]
bundle_id = "com.yubico.yubioath"
title = "Yubico Authenticator"
dont_focus = true
index = 101

[windows.focus_mailbridge]
bundle_id = "com.protonmail.bridge"
title = "Proton Mail Bridge"
dont_focus = true
index = 102

# Window positioning

# Window floating
[windows.floating_bettertouchtool_screenshots]
bundle_id = "com.hegenberg.BetterTouchTool"
title = "Screenshot*"
floating = true

[windows.floating_libreoffice]
bundle_id = "org.libreoffice.script"
title = "About LibreOffice|Delete Cells|Delete Contents|Format Cells|Function Wizard|Merge Cells|Optimal Column Width|Optimal Row Height|Paste Special|Rename Sheet|Save Document\\?"
floating = true

[windows.floating_thunderbird]
bundle_id = "org.mozilla.thunderbird"
title = "About Mozilla Thunderbird|Activity Manager|^Are you sure.*$|Check Spelling|Choose a color|Confirm Deletion|Folder Properties|Link Properties|Save Message|Send Later|^Sending Message - .*$|Text Color|Thunderbird Troubleshoot Mode"
floating = true

# Window sizing
[windows.sizing_calendar]
bundle_id = "com.apple.iCal"
title = "Calendar"
width = 0.85

[windows.sizing_finder]
bundle_id = "com.apple.finder"
title = ".*"
width = 0.67

[windows.sizing_libreoffice]
bundle_id = "org.libreoffice.script"
title = ".*"
width = 0.85
#
[windows.sizing_logseq]
bundle_id = "com.electron.logseq"
title = ".*"
width = 0.85

[windows.sizing_thunderbird]
bundle_id = "org.mozilla.thunderbird"
title = ".*"
width = 0.85

[windows.sizing_yubioath]
bundle_id = "com.yubico.yubioath"
title = "Yubico Authenticator"
width = 0.85

# Window padding
[windows.all]
# Matches all windows and adds a few pixels of spacing to their borders.
# Note: horizontal_padding and vertical_padding create gaps on all sides of
# each window. At screen edges, the gap is cancelled out so padding only
# appears between windows. Use the [padding] settings above to
# control screen edge margins independently.
title = ".*"
horizontal_padding = 6
vertical_padding = 4
